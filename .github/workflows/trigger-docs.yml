name: Trigger Docs Update

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/trigger-docs.yml"
      - "docs/**"

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch docs update
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DOCS_TRIGGER_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/loom-go/docs/dispatches \
            -d '{"event_type": "update-docs", "client_payload": {"module": "github.com/loom-go/web", "version": "${{ github.sha }}"}}'
