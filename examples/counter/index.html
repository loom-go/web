<!doctype html>
<html>

<head>
  <meta charset="utf-8" />
  <title>App</title>
</head>

<body>
  <div id="app"></div>

  <script src="https://cdn.jsdelivr.net/gh/golang/go@go1.25.0/lib/wasm/wasm_exec.js"></script>
  <script>
    const go = new Go();
    WebAssembly.instantiateStreaming(
      fetch("main.wasm"),
      go.importObject,
    ).then((r) => go.run(r.instance));
  </script>
</body>

</html>
